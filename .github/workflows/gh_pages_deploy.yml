name: GitHub Pages Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: false

      - name: Clean Cache & Environment
        run: |
          flutter clean
          flutter pub cache clean -f

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Web
        # Standard production build for web (obfuscate not supported on web) with no icon tree shaking for stable compilation
        run: flutter build web --release --base-href "/cold/" --web-renderer canvaskit --no-tree-shake-icons --verbose

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
